<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cropping Clip Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #111;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .pill-button {
      position: relative;
      width: 420px;
      height: 70px;
      border-radius: 35px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Lớp gradient nền - cũng xoay chậm */
    .pill-button .gradient {
      position: absolute;
      inset: -40%;
      width: 180%;
      height: 180%;
      background: conic-gradient(
        from 0deg,
        #6b2fa0, #8b3a9f, #c94e4e, #e06040,
        #d4508a, #a04090, #7030a0, #5020c0,
        #c94e4e, #e06040, #6b2fa0
      );
      animation: rotateGradient 8s linear infinite;
    }

    @keyframes rotateGradient {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Lớp noise 1 - di chuyển ngang dọc loạn */
    .pill-button .noise {
      position: absolute;
      inset: -100%;
      width: 300%;
      height: 300%;
      opacity: 0.6;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n1'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n1)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      animation: driftNoise1 4s ease-in-out infinite alternate;
    }

    @keyframes driftNoise1 {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(60px, -40px) scale(1.05); }
      50%  { transform: translate(-30px, 50px) scale(0.95); }
      75%  { transform: translate(40px, 20px) scale(1.02); }
      100% { transform: translate(-50px, -30px) scale(1); }
    }

    /* Lớp noise 2 - di chuyển ngược hướng */
    .pill-button .noise2 {
      position: absolute;
      inset: -100%;
      width: 300%;
      height: 300%;
      opacity: 0.4;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.1' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      animation: driftNoise2 5s ease-in-out infinite alternate-reverse;
    }

    @keyframes driftNoise2 {
      0%   { transform: translate(0, 0) rotate(0deg); }
      33%  { transform: translate(-70px, 30px) rotate(5deg); }
      66%  { transform: translate(50px, -60px) rotate(-3deg); }
      100% { transform: translate(30px, 40px) rotate(4deg); }
    }

    /* Lớp noise 3 - pulse + di chuyển tạo hiệu ứng lấp lánh */
    .pill-button .noise3 {
      position: absolute;
      inset: -80%;
      width: 260%;
      height: 260%;
      opacity: 0.3;
      mix-blend-mode: color-dodge;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n3'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.5' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n3)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      animation: driftNoise3 3s ease-in-out infinite alternate;
    }

    @keyframes driftNoise3 {
      0%   { transform: translate(20px, 10px) scale(1); opacity: 0.2; }
      50%  { transform: translate(-40px, -20px) scale(1.1); opacity: 0.35; }
      100% { transform: translate(30px, -40px) scale(0.9); opacity: 0.25; }
    }

    /* Chữ */
    .pill-button .text {
      position: relative;
      z-index: 2;
      color: white;
      font-size: 22px;
      font-style: italic;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

  <div class="pill-button">
    <div class="gradient"></div>
    <div class="noise"></div>
    <div class="noise2"></div>
    <div class="noise3"></div>
    <span class="text">Cropping Clip...</span>
  </div>

</body>
</html>
